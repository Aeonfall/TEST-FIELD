<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aeonfall Campaign - Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Roboto+Slab:wght@300;400;700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Slab', serif; background-color: #1a1a1a; color: #e2e8f0; overflow-x: hidden; }
        .dashboard-bg { background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png'); background-color: #121212; }
        .card { transition: all 0.2s; cursor: pointer; border-left-width: 4px; position: relative; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.7); }
        #sheet-container { background-color: #e8e0cd; min-height: 100vh; padding-bottom: 120px; color: #333; transition: filter 0.3s ease; }
        .sheet-card { background-color: #fff; border: 1px solid #dcd3c0; border-radius: 4px; padding: 16px; margin-bottom: 16px; position: relative; }
        .nav-link { color: #94a3b8; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }
        .nav-link.active { color: #f59e0b; border-bottom: 2px solid #f59e0b; }
        .role-selector { background: #0f172a; border-radius: 12px; padding: 4px; display: flex; gap: 4px; border: 1px solid #1e293b; }
        .role-btn { padding: 8px 24px; font-family: 'Cinzel', serif; font-size: 11px; font-weight: 900; border-radius: 8px; color: #475569; flex: 1; text-align: center; }
        .role-btn.active { background: #d97706; color: white; }
        .hidden-view { display: none !important; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
        .modal-container { background: white; border-radius: 12px; width: 100%; max-width: 500px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; color: #333; }
        .dm-auth-container { background: #1e232b !important; border: 2px solid #c2782c !important; border-radius: 30px !important; }
        .dm-auth-input { background: #13171c !important; border-radius: 12px !important; padding: 16px !important; color: #ffffff !important; text-align: center !important; }
        .dm-auth-enter-btn { background: #c2782c !important; color: white !important; font-family: 'Cinzel', serif; font-weight: 900; padding: 16px !important; border-radius: 18px !important; width: 100% !important; text-transform: uppercase !important; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 24px; border-radius: 30px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="toast" class="toast">Message</div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-screen" class="min-h-screen dashboard-bg p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            <header class="flex flex-col items-center md:items-start md:flex-row justify-between mb-10 border-b border-gray-800 pb-8 gap-8">
                <div class="text-center md:text-left">
                    <h1 class="text-5xl md:text-7xl text-amber-500 font-bold mb-2 font-serif tracking-tight leading-none">Aeonfall</h1>
                    <div class="flex flex-col md:flex-row items-center gap-4">
                        <span id="user-display-name" class="text-[10px] font-black text-gray-200 uppercase tracking-widest bg-gray-800 px-3 py-1 rounded-full">Guest</span>
                        <div id="active-campaign-badge" class="text-indigo-400 font-serif font-black text-sm uppercase tracking-widest border border-indigo-900/50 bg-indigo-900/20 px-3 py-1 rounded"></div>
                        <button onclick="window.exitCampaign()" class="text-[10px] text-indigo-400 font-black ml-2 transition-colors">SWITCH CAMPAIGN</button>
                    </div>
                </div>

                <div class="flex flex-col items-center md:items-end gap-6">
                    <div class="role-selector w-full max-w-[300px] shadow-2xl">
                        <button id="role-player-btn" onclick="window.setRole('player')" class="role-btn active">Player</button>
                        <button id="role-dm-btn" onclick="window.setRole('dm')" class="role-btn">DM</button>
                    </div>
                    <nav class="flex gap-6 items-center">
                        <a href="#" onclick="window.setView('party'); return false;" id="nav-party" class="nav-link active">Party</a>
                        <a href="#" onclick="window.logout()" class="nav-link text-red-500">Logout</a>
                    </nav>
                </div>
            </header>

            <div id="view-content" class="space-y-8">
                <div id="party-view-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <!-- DM CLAIM / LOGIN MODAL -->
    <div id="dm-setup-modal" class="modal-overlay hidden z-[900]">
        <div class="modal-container dm-auth-container">
            <h2 class="text-amber-500 font-serif text-center text-2xl mb-4">Claim Campaign</h2>
            <p class="text-gray-400 text-[10px] text-center mb-6 uppercase tracking-widest font-bold">This campaign has no DM. Enter your Master DM Password to claim it.</p>
            <div class="space-y-4">
                <input type="password" id="dm-claim-password" class="w-full dm-auth-input" placeholder="••••••••">
                <button onclick="window.claimDmRole()" class="dm-auth-enter-btn">Claim Role</button>
                <button onclick="document.getElementById('dm-setup-modal').classList.add('hidden')" class="text-gray-500 uppercase text-[10px] block mx-auto mt-4">Cancel</button>
            </div>
        </div>
    </div>

    <div id="dm-login-modal" class="modal-overlay hidden z-[900]">
        <div class="modal-container dm-auth-container">
            <h2 class="text-amber-500 font-serif text-center text-2xl mb-4">DM Authorization</h2>
            <p class="text-gray-400 text-[10px] text-center mb-6 uppercase tracking-widest font-bold">Enter your Master DM Password.</p>
            <div class="space-y-4">
                <input type="password" id="dm-login-password" class="w-full dm-auth-input" placeholder="••••••••">
                <button onclick="window.verifyDmPassword()" class="dm-auth-enter-btn">Enter</button>
                <button onclick="document.getElementById('dm-login-modal').classList.add('hidden')" class="text-gray-500 uppercase text-[10px] block mx-auto mt-4">Back</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLN0KhcnZFKZEYyR0O-Q2mZhKr-iyh7BI",
            authDomain: "aeonfall-523c1.firebaseapp.com",
            projectId: "aeonfall-523c1",
            storageBucket: "aeonfall-523c1.firebasestorage.app",
            messagingSenderId: "716207733913",
            appId: "1:716207733913:web:7aac43906a70e2b5f50c08"
        };

        const appId = 'aeonfall-manager-v2';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, activeCampaignId = null, activeRole = 'player';
        let campaigns = [], allCharacters = [];

        window.showToast = (m) => { 
            const t = document.getElementById('toast'); 
            t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 4000); 
        };

        async function hashPassword(str) {
            const msgBuffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        window.safeRedirect = (url, message) => {
            if (window.location.protocol === 'blob:') {
                document.body.innerHTML = `<div class="min-h-screen bg-black flex items-center justify-center p-8 text-center"><div class="bg-gray-800 p-8 rounded-xl border border-amber-500 shadow-2xl"><h1>${message}</h1><p>Please open <b>${url}</b> manually.</p></div></div>`;
            } else {
                window.location.href = url;
            }
        };

        window.logout = () => { localStorage.clear(); window.safeRedirect('index.html', 'Logged Out'); };
        window.exitCampaign = () => { localStorage.removeItem('aeonfall_active_campaign'); window.safeRedirect('campaign.html', 'Exiting Campaign'); };

        window.setRole = async (r) => { 
            if (r === 'player') {
                activeRole = 'player';
                window.updateRoleUI();
                return;
            }

            const camp = campaigns.find(c => c.id === activeCampaignId);
            if (!camp) return;

            if (!camp.dmClaimedBy) {
                document.getElementById('dm-setup-modal').classList.remove('hidden'); 
            } else {
                if (camp.dmClaimedBy !== currentUser.username) {
                    window.showToast("Locked to DM: " + camp.dmClaimedBy);
                    return;
                }
                document.getElementById('dm-login-modal').classList.remove('hidden');
            }
        };

        window.claimDmRole = async () => {
            const pass = document.getElementById('dm-claim-password').value;
            const hash = await hashPassword(pass);
            const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', currentUser.id));
            if (userDoc.data().dmPasswordHash === hash) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'campaigns', activeCampaignId), { dmClaimedBy: currentUser.username });
                document.getElementById('dm-setup-modal').classList.add('hidden');
                activeRole = 'dm'; window.updateRoleUI(); window.showToast("Campaign Claimed!");
            } else { window.showToast("Incorrect Master Password"); }
        };

        window.verifyDmPassword = async () => {
            const pass = document.getElementById('dm-login-password').value;
            const hash = await hashPassword(pass);
            const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', currentUser.id));
            if (userDoc.data().dmPasswordHash === hash) {
                document.getElementById('dm-login-modal').classList.add('hidden');
                activeRole = 'dm'; window.updateRoleUI(); window.showToast("DM Access Granted");
            } else { window.showToast("Incorrect Password"); }
        };

        window.updateRoleUI = () => {
            document.getElementById('role-player-btn').classList.toggle('active', activeRole !== 'dm');
            document.getElementById('role-dm-btn').classList.toggle('active', activeRole === 'dm');
            window.renderDashboard();
        };

        window.renderDashboard = () => {
            const cont = document.getElementById('party-view-container');
            const characters = allCharacters.filter(c => c.campaignId === activeCampaignId && !c.isDeleted);
            cont.innerHTML = characters.map(c => `
                <div class="bg-gray-800 p-5 rounded-xl border-l-4 border-amber-500 shadow-lg">
                    <h3 class="text-amber-500 font-serif font-bold">${c.name}</h3>
                    <p class="text-xs text-gray-400 uppercase">${c.class || 'Class'}</p>
                </div>
            `).join('');
        };

        const initAuth = async () => {
            const savedUser = localStorage.getItem('aeonfall_user');
            const savedCamp = localStorage.getItem('aeonfall_active_campaign');
            if (!savedUser || !savedCamp) { window.safeRedirect('index.html', 'Unauthorized'); return; }
            
            currentUser = JSON.parse(savedUser);
            activeCampaignId = savedCamp;
            document.getElementById('user-display-name').textContent = currentUser.username;
            document.getElementById('active-campaign-badge').textContent = localStorage.getItem('aeonfall_active_campaign_name');

            await signInAnonymously(auth);
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'campaigns'), (snap) => {
                campaigns = snap.docs.map(d => ({id: d.id, ...d.data()}));
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'characters'), (snap) => {
                allCharacters = snap.docs.map(d => ({id: d.id, ...d.data()}));
                window.renderDashboard();
            });
        };

        initAuth();
    </script>
</body>
</html>
