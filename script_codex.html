    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, setDoc, onSnapshot, addDoc, deleteDoc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // --- CORE UI FUNCTIONS ---
        window.showToast = (m) => { 
            const t = document.getElementById('toast'); 
            if(t){ t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 4000); } 
        };

        window.routeTo = (page) => {
            const currentId = new URLSearchParams(window.location.search).get('id') || new URLSearchParams(window.location.search).get('campaignId');
            try {
                if (currentId && currentId !== "demo_campaign") {
                    window.location.href = `${page}?id=${currentId}`;
                } else {
                    window.location.href = page;
                }
            } catch(e) {
                window.showToast("Redirects disabled in preview window.");
            }
        };

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKRN5dfi4og69_D8ZAvV1BQfwCK_f2uis",
            authDomain: "dndcampaigns-f3d48.firebaseapp.com",
            projectId: "dndcampaigns-f3d48",
            storageBucket: "dndcampaigns-f3d48.firebasestorage.app",
            messagingSenderId: "1074491536795",
            appId: "1:1074491536795:web:56211729489be776d79d3e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CAMPAIGN SCOPING ---
        const urlParams = new URLSearchParams(window.location.search);
        let appId = urlParams.get('id') || urlParams.get('campaignId');
        const isPreviewEnv = window.location.href.startsWith('blob:') || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        if (!appId) {
            if (isPreviewEnv) { appId = "demo_campaign"; } 
            else { try { window.location.href = "campaigns.html"; } catch(e) {} }
        }

        const DB_COLLECTION = `scriptCodex_${appId}`;

        // --- STATE ---
        let scripts = [];
        let characters = []; // For transfer feature
        let currentUser = null;
        let activeRole = 'player';
        
        let currentLevelFilter = '0';
        let currentVocationFilter = 'All'; // Uses the ID like 'class_heartbound'
        
        let activeScriptId = null;
        let targetTransferScript = null;
        let campaignSettings = { terms: {} };

        // --- VOCATION CONFIGURATION ---
        const VOC_KEYS = [
            { id: 'class_heartbound', default: 'Heartbound', min: 1, max: 5 },
            { id: 'class_nomad', default: 'Nomad', min: 1, max: 5 },
            { id: 'class_warden', default: 'Wilderness Warden', min: 0, max: 9 },
            { id: 'class_chronicler', default: 'Chronicler', min: 0, max: 9 },
            { id: 'class_orator', default: 'Orator', min: 0, max: 9 },
            { id: 'class_scriptweaver', default: 'Scriptweaver', min: 0, max: 9 },
            { id: 'class_wartouched', default: 'War-Touched', min: 0, max: 9 },
            { id: 'class_archivist', default: 'Archivist', min: 0, max: 9 },
            { id: 'class_fabricator', default: 'Fabricator', min: 0, max: 5 }
        ];

        // --- RENDER LOGIC ---
        window.renderLevelTabs = () => {
            const container = document.getElementById('level-tabs-container');
            if (!container) return;

            let min = 0; let max = 9;
            if (currentVocationFilter !== 'All') {
                const voc = VOC_KEYS.find(v => v.id === currentVocationFilter);
                if (voc) {
                    min = voc.min;
                    max = voc.max;
                }
            }

            // Ensure currentLevel is within the bounds of the newly selected vocation
            let currLvlInt = parseInt(currentLevelFilter) || 0;
            if (currLvlInt < min) currentLevelFilter = min.toString();
            if (currLvlInt > max) currentLevelFilter = max.toString();

            let html = '';
            for (let i = min; i <= max; i++) {
                const isActive = currentLevelFilter === i.toString() ? 'active' : '';
                const label = i === 0 ? 'T' : i; // T for Tricks
                html += `<button onclick="window.setLevelFilter('${i}')" class="level-tab ${isActive}" id="tab-lvl-${i}">${label}</button>`;
            }
            container.innerHTML = html;
        };

        window.setLevelFilter = (lvl) => {
            currentLevelFilter = lvl;
            document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(`tab-lvl-${lvl}`);
            if (activeTab) activeTab.classList.add('active');
            
            const vt = document.getElementById('view-title');
            if (vt) {
                let vocTxt = 'All Scripts';
                if (currentVocationFilter !== 'All') {
                    const voc = VOC_KEYS.find(v => v.id === currentVocationFilter);
                    if (voc) vocTxt = campaignSettings?.terms?.[voc.id] || voc.default;
                }
                
                let lvlTxt = lvl === '0' ? 'Tricks' : `Lv. ${lvl}`;
                vt.textContent = `${vocTxt} — ${lvlTxt}`;
            }
            
            window.renderScripts();
        };

        window.setVocationFilter = (vocId) => {
            currentVocationFilter = vocId;
            window.renderVocationTabs();
            window.renderLevelTabs();
            window.setLevelFilter(currentLevelFilter); 
        };

        window.renderVocationTabs = () => {
            const container = document.getElementById('vocation-tabs-container');
            if (!container) return;
            
            let html = `<button onclick="window.setVocationFilter('All')" class="vocation-tab ${currentVocationFilter === 'All' ? 'active' : ''}" id="tab-voc-All">ALL</button>`;
            
            VOC_KEYS.forEach(v => {
                const displayName = campaignSettings?.terms?.[v.id] || v.default;
                html += `<button onclick="window.setVocationFilter('${v.id}')" class="vocation-tab ${currentVocationFilter === v.id ? 'active' : ''}" id="tab-voc-${v.id}">${displayName.toUpperCase()}</button>`;
            });

            container.innerHTML = html;
        };

        window.parseAeonfallContent = (text) => {
            if (!text) return '';
            let html = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            html = html.replace(/\*(.*?)\*/g, '<i>$1</i>');
            html = html.replace(/\n/g, '<br>');
            return html;
        };

        window.renderScripts = () => {
            const isDM = activeRole === 'dm';
            const grid = document.getElementById('scripts-grid');
            if (!grid) return;

            // Filter scripts by Level and Vocation search string
            let visibleScripts = scripts.filter(s => (s.level || '0') === currentLevelFilter);
            
            if (currentVocationFilter !== 'All') {
                const targetVoc = VOC_KEYS.find(v => v.id === currentVocationFilter);
                if (targetVoc) {
                    const searchName = (campaignSettings?.terms?.[targetVoc.id] || targetVoc.default).toLowerCase();
                    visibleScripts = visibleScripts.filter(s => {
                        const lists = (s.lists || '').toLowerCase();
                        return lists.includes(searchName);
                    });
                }
            }

            if (visibleScripts.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center border-2 border-dashed border-gray-700 rounded-lg bg-black/40"><i class="fa-solid fa-scroll text-4xl text-gray-600 mb-4"></i><p class="text-gray-500 text-sm italic font-serif">No scripts found for this criteria.</p></div>`;
                return;
            }

            grid.innerHTML = visibleScripts.map(s => {
                let lvlTxt = s.level === '0' ? 'Trick' : `Level ${s.level}`;
                let typeTxt = s.sType ? `[${s.sType}]` : '';
                let metaTxt = `${lvlTxt} — ${s.school || 'Universal'} ${typeTxt}`;

                let dmControls = isDM ? `<button onclick="window.openScriptModal('${s.id}')" class="absolute top-4 right-4 text-gold hover:text-white transition-colors"><i class="fa-solid fa-pen"></i></button>` : '';

                return `
                    <div class="script-card">
                        ${dmControls}
                        <h3 class="script-title pr-8">${s.name || 'Unnamed Script'}</h3>
                        <p class="script-meta">${metaTxt}</p>
                        
                        <ul class="script-props">
                            <li><b>Activation Time:</b> ${s.activation || '--'}</li>
                            <li><b>Range/Area:</b> ${s.range || '--'}</li>
                            <li><b>Components:</b> ${s.comp || '--'}</li>
                            <li><b>Duration:</b> ${s.duration || '--'}</li>
                        </ul>

                        <div class="script-desc">${window.parseAeonfallContent(s.desc)}</div>
                        
                        ${s.scaling ? `<div class="script-higher"><b>At Higher Levels.</b> ${window.parseAeonfallContent(s.scaling)}</div>` : ''}
                        
                        <div class="script-lists">Lists: ${s.lists || 'Universal'}</div>

                        <button onclick="window.openTransferModal('${s.id}')" class="bg-[rgba(255,255,255,0.6)] hover:bg-white text-[#7a1b1b] border border-[rgba(139,90,43,0.3)] py-2 rounded text-[10px] font-black uppercase tracking-widest font-heading flex items-center justify-center gap-2 transition-colors mt-2 shadow-sm">
                            <i class="fa-solid fa-download"></i> Transfer Knowledge
                        </button>
                    </div>
                `;
            }).join('');
        };

        // --- DM ACTIONS ---
        window.openScriptModal = (id = null) => {
            if (activeRole !== 'dm') return;
            activeScriptId = id;
            const titleEl = document.getElementById('script-modal-title');
            
            if (id) {
                const s = scripts.find(x => x.id === id);
                titleEl.textContent = "Edit Script";
                document.getElementById('script-name').value = s.name || '';
                document.getElementById('script-level').value = s.level || '0';
                document.getElementById('script-school').value = s.school || '';
                document.getElementById('script-type').value = s.sType || '';
                document.getElementById('script-activation').value = s.activation || '';
                document.getElementById('script-range').value = s.range || '';
                document.getElementById('script-comp').value = s.comp || '';
                document.getElementById('script-duration').value = s.duration || '';
                document.getElementById('script-desc').value = s.desc || '';
                document.getElementById('script-scaling').value = s.scaling || '';
                document.getElementById('script-lists').value = s.lists || '';
                document.getElementById('script-delete-btn').classList.remove('hidden');
            } else {
                titleEl.textContent = "Inscribe New Script";
                document.getElementById('script-name').value = '';
                document.getElementById('script-level').value = currentLevelFilter;
                document.getElementById('script-school').value = '';
                document.getElementById('script-type').value = '';
                document.getElementById('script-activation').value = '';
                document.getElementById('script-range').value = '';
                document.getElementById('script-comp').value = '';
                document.getElementById('script-duration').value = '';
                document.getElementById('script-desc').value = '';
                document.getElementById('script-scaling').value = '';
                
                // Pre-fill lists field if a specific vocation is selected
                let listDefault = "";
                if (currentVocationFilter !== 'All') {
                    const voc = VOC_KEYS.find(v => v.id === currentVocationFilter);
                    if (voc) listDefault = campaignSettings?.terms?.[voc.id] || voc.default;
                }
                document.getElementById('script-lists').value = listDefault;
                document.getElementById('script-delete-btn').classList.add('hidden');
            }
            
            document.getElementById('script-modal').classList.remove('hidden');
        };

        window.closeScriptModal = () => document.getElementById('script-modal').classList.add('hidden');

        window.saveScript = async () => {
            if (activeRole !== 'dm') return;
            const payload = {
                name: document.getElementById('script-name').value.trim() || 'Unnamed Script',
                level: document.getElementById('script-level').value.toString(),
                school: document.getElementById('script-school').value.trim(),
                sType: document.getElementById('script-type').value.trim(),
                activation: document.getElementById('script-activation').value.trim(),
                range: document.getElementById('script-range').value.trim(),
                comp: document.getElementById('script-comp').value.trim(),
                duration: document.getElementById('script-duration').value.trim(),
                desc: document.getElementById('script-desc').value.trim(),
                scaling: document.getElementById('script-scaling').value.trim(),
                lists: document.getElementById('script-lists').value.trim(),
                updatedAt: Date.now()
            };

            try {
                if (activeScriptId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, activeScriptId), payload);
                    window.showToast("Script updated.");
                } else {
                    payload.createdAt = Date.now();
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION), payload);
                    window.showToast("New Script Inscribed.");
                }
                window.closeScriptModal();
            } catch (err) {
                console.error(err);
                window.showToast("Error saving script.");
            }
        };

        window.deleteScript = async () => {
            if (activeRole !== 'dm' || !activeScriptId) return;
            if (!confirm("Permanently erase this script from the codex?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, activeScriptId));
                window.closeScriptModal();
                window.showToast("Script erased.");
            } catch (e) {
                window.showToast("Error deleting script.");
            }
        };

        // --- TRANSFER SYSTEM ---
        window.openTransferModal = (scriptId) => {
            targetTransferScript = scripts.find(s => s.id === scriptId);
            if (!targetTransferScript) return;
            
            const select = document.getElementById('transfer-char-select');
            select.innerHTML = '<option value="">Select Target...</option>';
            
            // Filter characters: DMs see all PCs, Players see only their own PCs
            const isDM = activeRole === 'dm';
            const validTargets = characters.filter(c => c.type === 'PC' && !c.isDeleted && (isDM || c.owner === currentUser.username));
            
            if (validTargets.length === 0) {
                select.innerHTML = '<option value="">No valid characters found</option>';
            } else {
                validTargets.forEach(c => {
                    select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
            }
            
            document.getElementById('transfer-modal').classList.remove('hidden');
        };

        window.executeTransfer = async () => {
            const charId = document.getElementById('transfer-char-select').value;
            if (!charId || !targetTransferScript) return window.showToast("Select a character first.");
            
            const char = characters.find(c => c.id === charId);
            if (!char) return window.showToast("Character not found.");

            // Format description and compile the move object
            let fullDesc = `**Cast Time:** ${targetTransferScript.activation || '--'}\n**Range:** ${targetTransferScript.range || '--'}\n**Duration:** ${targetTransferScript.duration || '--'}\n**Components:** ${targetTransferScript.comp || '--'}\n\n${targetTransferScript.desc}`;
            
            const newMove = {
                name: targetTransferScript.name,
                roll: "", // Scripts usually don't have a single hardcoded roll
                desc: fullDesc,
                lvl: targetTransferScript.level === '0' ? 'Tricks (0)' : `Level ${targetTransferScript.level}`,
                type: "scriptcasting",
                school: targetTransferScript.school || '',
                sType: targetTransferScript.sType || '',
                activation: targetTransferScript.activation || '',
                range: targetTransferScript.range || '',
                comp: targetTransferScript.comp || '',
                duration: targetTransferScript.duration || '',
                scaling: targetTransferScript.scaling || ''
            };

            const updatedMoves = [...(char.moves || []), newMove];

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'characters', charId), {
                    moves: updatedMoves
                });
                document.getElementById('transfer-modal').classList.add('hidden');
                window.showToast(`Script injected into ${char.name}'s ledger!`);
                targetTransferScript = null;
            } catch (err) {
                console.error(err);
                window.showToast("Transfer failed.");
            }
        };

        // --- AUTH & INITIALIZATION ---
        onAuthStateChanged(auth, async (u) => {
            if (!u) {
                try { window.location.href = "index.html"; } catch(e) {
                    document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Authentication Required</h2>`;
                }
                return;
            }
            
            try {
                if (u.isAnonymous) {
                    currentUser = { uid: u.uid, username: "Guest Traveler", role: 'player' };
                } else {
                    const userDoc = await getDoc(doc(db, 'users', u.uid));
                    if (userDoc.exists()) {
                        currentUser = { uid: u.uid, ...userDoc.data() };
                    } else {
                        currentUser = { uid: u.uid, username: u.displayName || 'Traveler', role: 'player' };
                    }
                }

                activeRole = currentUser.role || 'player';

                // Fetch campaign name
                if (appId !== "demo_campaign") {
                    const campDoc = await getDoc(doc(db, 'campaigns', appId));
                    if (campDoc.exists() && campDoc.data().name) {
                        const titleEl = document.getElementById('main-campaign-title-label');
                        if (titleEl) {
                            // If they haven't renamed it, default to Campaign Name - Script Codex
                            if (titleEl.innerText === 'Script Codex') titleEl.innerText = `${campDoc.data().name} Codex`;
                        }
                        document.title = `${campDoc.data().name} - Scripts`;
                    }
                }

                document.getElementById('user-display-name').innerText = currentUser.username;
                
                // Toggle DM Features
                const isDM = activeRole === 'dm';
                document.getElementById('btn-create-script')?.classList.toggle('hidden', !isDM);

                document.getElementById('initial-loading').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');

                // Initialize Tabs
                window.renderVocationTabs();
                window.renderLevelTabs();
                window.setLevelFilter(currentLevelFilter);
                
                // --- DATABASE LISTENERS ---
                
                // 1. Listen for Terminology Config
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'campaignConfig', 'settings'), (docSnap) => {
                    if (docSnap.exists()) {
                        campaignSettings = docSnap.data();
                        
                        // Apply Nav Terminology
                        const safeSet = (id, val) => { const el = document.getElementById(id); if (el && val) el.innerText = val; };
                        safeSet('nav-party', campaignSettings.terms?.nav_party);
                        safeSet('nav-npcs', campaignSettings.terms?.nav_npcs);
                        safeSet('nav-beasts', campaignSettings.terms?.nav_beasts);
                        safeSet('nav-backpack', campaignSettings.terms?.nav_backpack);
                        safeSet('nav-handbook', campaignSettings.terms?.nav_handbook);
                        safeSet('nav-graveyard', campaignSettings.terms?.nav_graveyard);
                        
                        const titleEl = document.getElementById('main-campaign-title-label');
                        if (titleEl) titleEl.innerText = campaignSettings.terms?.book_scriptcodex || 'Script Codex';
                        
                        // Re-render tabs and titles with new names
                        window.renderVocationTabs();
                        window.setLevelFilter(currentLevelFilter);
                    }
                }, (err) => console.error("Terminology Sync Error:", err));

                // 2. Listen for Scripts
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION), (snap) => {
                    scripts = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.name > b.name ? 1 : -1));
                    window.renderScripts();
                }, (err) => console.error("Script Sync Error:", err));

                // 3. Listen for Characters (For Transfer Feature)
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'characters'), (snap) => {
                    characters = snap.docs.map(d => ({id: d.id, ...d.data()}));
                });

            } catch (error) {
                console.error(error);
                document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Database Connection Failed</h2>`;
            }
        });
    </script>
</body>
</html>
