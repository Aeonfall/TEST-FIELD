<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronicles - Script Codex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'parchment': '#f1e5c5', 'ink': '#2c1e16', 'blood': '#7a1b1b', 'gold': '#c5a059', 'wood': '#1a110b' }, fontFamily: { 'serif': ['Lora', 'serif'], 'heading': ['Cinzel', 'serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Lora', serif; background-color: #1a110b; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%232c1e16' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E"); color: #f1e5c5; overflow-x: hidden; }
        
        .parchment-card { background-color: #f1e5c5; background-image: radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.3) 100%), url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); box-shadow: inset 0 0 40px rgba(139, 90, 43, 0.4), 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #e8cd87; border-radius: 8px; color: #2c1e16; position: relative; display: flex; flex-direction: column; }
        
        .fantasy-btn { background: linear-gradient(to bottom, #c5a059, #8b5a2b); color: #1a110b !important; border: 2px solid #e8cd87 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.4) !important; font-weight: 900; }
        .fantasy-btn:hover { background: linear-gradient(to bottom, #e8cd87, #a67232); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.6) !important; border-color: #fff !important; }
        
        .fantasy-btn-alt { background: linear-gradient(to bottom, #2c1e16, #1a110b); color: #c5a059 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; }
        .fantasy-btn-alt:hover { background: linear-gradient(to bottom, #3d2a1f, #2c1e16); color: #f1e5c5 !important; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.6) !important; }

        .nav-link { color: #888; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; cursor: pointer; text-decoration: none; white-space: nowrap; font-family: 'Cinzel', serif; }
        .nav-link.active { color: #c5a059; border-bottom: 2px solid #c5a059; padding-bottom: 4px; text-shadow: 0 0 10px rgba(197, 160, 89, 0.5); }
        .nav-link:hover { color: #f1e5c5; }

        /* Vocation & Level Tab Styles matching screenshot */
        .vocation-tab { background: rgba(0,0,0,0.4); border: 1px solid #444; color: #888; font-family: 'Cinzel', serif; font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 6px 12px; transition: all 0.2s; cursor: pointer; letter-spacing: 1px; white-space: nowrap; }
        .vocation-tab:hover { border-color: #c5a059; color: #c5a059; background: rgba(0,0,0,0.6); }
        .vocation-tab.active { background: #c5a059; color: #1a110b; border-color: #e8cd87; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }

        .level-tab { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #e8cd87; color: #1a110b; font-weight: 900; font-family: 'Cinzel', serif; cursor: pointer; transition: all 0.2s; font-size: 12px; border: 2px solid transparent; }
        .level-tab:hover { transform: scale(1.1); }
        .level-tab.active { background: #7a1b1b; color: #f1e5c5; border-color: #e8cd87; box-shadow: 0 0 10px rgba(122, 27, 27, 0.8); }

        /* Editable Fields */
        .dm-active-edit .dm-editable { background: rgba(255, 255, 255, 0.3); outline: 1px dashed rgba(139, 90, 43, 0.4); border-radius: 4px; padding: 2px 4px; transition: background 0.2s, outline 0.2s; min-height: 1.2em; display: inline-block; width: 100%; }
        .dm-active-edit .dm-editable:focus { background: rgba(255, 255, 255, 0.8); outline: 2px solid #7a1b1b; }
        .dm-active-edit [contenteditable="true"]:empty::before { content: "Add text..."; color: #a38c75; font-style: italic; pointer-events: none; display: block; }
        
        .dm-active-edit input.dm-input { background: rgba(255, 255, 255, 0.3); border-bottom: 1px dashed rgba(139, 90, 43, 0.4); border-radius: 2px; padding: 2px 4px; color: inherit; font: inherit; width: 100%; outline: none; transition: background 0.2s; }
        .dm-active-edit input.dm-input:focus { background: rgba(255, 255, 255, 0.8); border-bottom: 2px solid #7a1b1b; }
        input:not(.dm-input):disabled { background: transparent; border: none; color: inherit; -webkit-text-fill-color: inherit; opacity: 1; }
        textarea:not(.dm-input):disabled { background: transparent; border: none; color: inherit; -webkit-text-fill-color: inherit; opacity: 1; resize: none; }

        .script-desc-area { width: 100%; min-height: 150px; background: rgba(255,255,255,0.4); border: 1px solid rgba(139, 90, 43, 0.3); border-radius: 4px; padding: 12px; font-family: 'Lora', serif; font-size: 13px; color: #2c1e16; line-height: 1.6; resize: vertical; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c1e16; border: 1px solid #c5a059; color: #f1e5c5; padding: 12px 24px; border-radius: 4px; z-index: 100000; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-family: 'Cinzel', serif; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 200000; padding: 20px; backdrop-filter: blur(4px); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div id="toast" class="toast">Message</div>

    <!-- Initial Loading State -->
    <div id="initial-loading" class="flex flex-col items-center justify-center h-screen fade-in w-full text-center">
        <i class="fa-solid fa-compass fa-spin text-6xl text-gold mb-6"></i>
        <h2 class="font-heading text-2xl text-parchment animate-pulse">Consulting the Codex...</h2>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-screen" class="min-h-screen p-4 md:p-8 hidden w-full">
        <div class="max-w-7xl mx-auto">
            <!-- HEADER & NAVIGATION -->
            <header class="flex flex-col items-center md:items-start md:flex-row justify-between mb-8 border-b border-gray-700 pb-6 gap-6 relative">
                <div class="absolute -bottom-1.5 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-gray-700 to-transparent opacity-50"></div>
                
                <div class="text-center md:text-left w-full md:w-auto">
                    <h1 id="main-campaign-title" class="text-4xl md:text-5xl text-gray-400 font-bold mb-1 font-heading tracking-tight leading-none drop-shadow-md">Chronicles</h1>
                    <div class="flex flex-col md:flex-row items-center gap-3 mt-2">
                        <p class="text-gray-500 text-xs uppercase tracking-[0.2em] font-bold font-heading">Script Codex</p>
                        <div class="bg-black bg-opacity-60 border border-gray-700 px-3 py-1 rounded flex items-center gap-2 shadow-inner">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e]"></span>
                            <span id="user-display-name" class="text-[10px] font-black text-gray-400 uppercase tracking-widest font-heading">Guest</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-center md:items-end gap-4 w-full md:w-auto mt-4 md:mt-0">
                    <div class="flex items-center gap-4">
                        <button onclick="try { window.location.href='campaigns.html' } catch(e) { window.showToast('Redirects disabled in preview.') }" class="fantasy-btn-alt px-4 py-1.5 text-xs rounded !border-gray-600 !text-gray-400 hover:!text-white"><i class="fa-solid fa-arrow-left mr-2"></i>Nexus</button>
                    </div>

                    <nav id="main-nav" class="flex gap-4 md:gap-6 items-center w-full overflow-x-auto scrollbar-hide pb-2 px-2 md:px-0 md:pb-0 justify-start md:justify-end mt-2">
                        <a href="#" onclick="window.routeTo('characters.html'); return false;" class="nav-link">Party</a>
                        <a href="#" onclick="window.routeTo('npcs.html'); return false;" class="nav-link">NPCs</a>
                        <a href="#" onclick="window.routeTo('beasts.html'); return false;" class="nav-link">Bestiary</a>
                        <a href="#" onclick="window.routeTo('backpack.html'); return false;" class="nav-link">Backpack</a>
                        <a href="#" onclick="window.routeTo('handbook.html'); return false;" class="nav-link">Handbook</a>
                        <a href="#" onclick="window.routeTo('graveyard.html'); return false;" class="nav-link">Graveyard</a>
                    </nav>
                </div>
            </header>

            <!-- FILTERS & HEADER -->
            <div class="flex flex-col gap-6 mb-8">
                <!-- Vocation Tabs (Generated Dynamically) -->
                <div class="flex overflow-x-auto scrollbar-hide gap-1 w-full" id="vocation-tabs-container">
                    <button onclick="window.setVocationFilter('All')" class="vocation-tab active" id="tab-voc-All">All Vocations</button>
                    <!-- More generated here -->
                </div>

                <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                    <div>
                        <h2 id="view-title" class="font-heading text-3xl font-black text-gold uppercase tracking-widest drop-shadow mb-2">All Scripts</h2>
                        <!-- Level Tabs -->
                        <div class="flex gap-2 items-center" id="level-tabs-container">
                            <!-- Level tabs dynamically generated by JS -->
                        </div>
                    </div>

                    <button id="add-script-btn" onclick="window.addScript()" class="hidden fantasy-btn px-6 py-3 rounded text-[11px]">+ New Script</button>
                </div>
            </div>

            <!-- SCRIPT MASONRY GRID -->
            <div id="scripts-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                <!-- Script Cards populate here -->
            </div>
        </div>
    </div>

    <!-- COPY TO CHARACTER MODAL -->
    <div id="copy-modal" class="modal-overlay hidden">
        <div class="parchment-card p-8 w-full max-w-sm text-center">
            <h3 class="font-heading text-xl font-bold text-blood uppercase mb-2 border-b border-blood/30 pb-2">Inscribe Script</h3>
            <p class="text-xs text-ink font-serif mb-6 italic">Select a target to copy <span id="copy-target-name" class="font-bold text-blood"></span> into their personal spellbook.</p>
            
            <div class="text-left mb-6">
                <label class="block text-[10px] font-bold text-ink uppercase tracking-widest font-heading mb-1">Target Entity</label>
                <select id="copy-target-select" class="w-full bg-white/50 border border-gold rounded p-2 text-ink text-sm outline-none focus:border-blood">
                    <option value="">Select Target...</option>
                    <!-- Populated by JS -->
                </select>
            </div>

            <div class="flex gap-3 font-heading">
                <button onclick="document.getElementById('copy-modal').classList.add('hidden')" class="flex-1 text-gray-600 font-bold uppercase text-[10px] border border-gray-400 rounded py-2.5 hover:bg-gray-200 transition-colors">Cancel</button>
                <button onclick="window.executeCopyScript()" class="flex-1 bg-blood text-parchment font-bold uppercase text-[10px] rounded py-2.5 hover:bg-red-800 shadow-md transition-colors border border-gold">Inscribe</button>
            </div>
        </div>
    </div>

    <!-- PURGE MODAL -->
    <div id="del-modal" class="modal-overlay hidden">
        <div class="parchment-card p-8 max-w-sm w-full text-center border-2 !border-blood shadow-2xl">
            <h3 class="font-heading font-black text-2xl text-blood uppercase tracking-widest mb-2">Expunge Script</h3>
            <p class="font-serif italic text-ink mb-6 text-sm">This script will be permanently erased from the codex.</p>
            <div class="flex flex-col gap-3 font-heading">
                <button id="confirm-del-btn" onclick="window.executeDelete()" class="w-full bg-blood text-parchment py-3 rounded border border-gold font-bold uppercase text-xs shadow transition-colors hover:bg-red-800">Confirm Erasure</button>
                <button onclick="document.getElementById('del-modal').classList.add('hidden')" class="w-full bg-transparent text-ink border border-ink py-3 rounded font-bold uppercase text-xs transition-colors hover:bg-ink hover:text-parchment">Cancel</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, setDoc, onSnapshot, addDoc, deleteDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // --- CORE UI FUNCTIONS ---
        window.showToast = (m) => { 
            const t = document.getElementById('toast'); 
            if(t){ t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 4000); } 
        };

        window.routeTo = (page) => {
            const currentId = new URLSearchParams(window.location.search).get('id') || new URLSearchParams(window.location.search).get('campaignId');
            try {
                if (currentId && currentId !== "demo_campaign") {
                    window.location.href = `${page}?id=${currentId}`;
                } else {
                    window.location.href = page;
                }
            } catch(e) {
                window.showToast("Redirects disabled in preview window.");
            }
        };

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKRN5dfi4og69_D8ZAvV1BQfwCK_f2uis",
            authDomain: "dndcampaigns-f3d48.firebaseapp.com",
            projectId: "dndcampaigns-f3d48",
            storageBucket: "dndcampaigns-f3d48.firebasestorage.app",
            messagingSenderId: "1074491536795",
            appId: "1:1074491536795:web:56211729489be776d79d3e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CAMPAIGN SCOPING ---
        const urlParams = new URLSearchParams(window.location.search);
        let appId = urlParams.get('id') || urlParams.get('campaignId');
        const isPreviewEnv = window.location.href.startsWith('blob:') || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        if (!appId) {
            if (isPreviewEnv) { appId = "demo_campaign"; } 
            else { try { window.location.href = "campaigns.html"; } catch(e) {} }
        }

        const DB_COLLECTION = `scriptCodex`; // Shared codex for the campaign

        let currentUser = null;
        let activeRole = 'player';
        let scripts = [];
        let charactersList = []; // For copy dropdown
        
        let currentLevelFilter = '0';
        let currentVocationFilter = 'All';
        
        let targetDelId = null;
        let targetCopyScript = null;
        let isUserTyping = false;

        // --- VOCATION CONFIGURATION ---
        const VOCATION_CONFIG = {
            'Heartbound': { min: 1, max: 5 },
            'Nomad': { min: 1, max: 5 },
            'Wilderness Warden': { min: 0, max: 9 },
            'Chronicler': { min: 0, max: 9 },
            'Orator': { min: 0, max: 9 },
            'Scriptweaver': { min: 0, max: 9 },
            'War-Touched': { min: 0, max: 9 },
            'Archivist': { min: 0, max: 9 },
            'Fabricator': { min: 0, max: 5 }
        };

        document.addEventListener('focusin', (e) => {
            if(e.target && (e.target.classList.contains('dm-editable') || e.target.classList.contains('dm-input') || e.target.classList.contains('script-desc-area'))) {
                isUserTyping = true;
            }
        });
        document.addEventListener('focusout', (e) => {
            if(e.target && (e.target.classList.contains('dm-editable') || e.target.classList.contains('dm-input') || e.target.classList.contains('script-desc-area'))) {
                isUserTyping = false;
                window.renderScripts();
            }
        });

        // --- DATABASE UPDATERS ---
        const debounce = (func, wait) => {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        };

        const performUpdate = async (id, payload) => {
            if (!currentUser || activeRole !== 'dm') return;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, id), payload);
            } catch (e) {
                console.error("Save failed:", e);
                window.showToast("Network Sync Failed");
            }
        };
        const debouncedUpdate = debounce(performUpdate, 800);

        window.dbUp = (id, field, val) => {
            if(activeRole !== 'dm' || !currentUser) return;
            debouncedUpdate(id, { [field]: val });
        };

        // --- FILTERING & RENDERING ---
        window.renderLevelTabs = () => {
            const container = document.getElementById('level-tabs-container');
            if (!container) return;

            let min = 0; let max = 9;
            if (currentVocationFilter !== 'All' && VOCATION_CONFIG[currentVocationFilter]) {
                min = VOCATION_CONFIG[currentVocationFilter].min;
                max = VOCATION_CONFIG[currentVocationFilter].max;
            }

            // Ensure currentLevel is within the bounds of the newly selected vocation
            let currLvlInt = parseInt(currentLevelFilter) || 0;
            if (currLvlInt < min) currentLevelFilter = min.toString();
            if (currLvlInt > max) currentLevelFilter = max.toString();

            let html = '';
            for (let i = min; i <= max; i++) {
                const isActive = currentLevelFilter === i.toString() ? 'active' : '';
                const label = i === 0 ? 'T' : i; // T for Tricks
                html += `<button onclick="window.setLevelFilter('${i}')" class="level-tab ${isActive}" id="tab-lvl-${i}">${label}</button>`;
            }
            container.innerHTML = html;
        };

        window.setLevelFilter = (lvl) => {
            currentLevelFilter = lvl;
            document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(`tab-lvl-${lvl}`);
            if (activeTab) activeTab.classList.add('active');
            
            const vt = document.getElementById('view-title');
            if (vt) {
                let vocTxt = currentVocationFilter === 'All' ? 'All Scripts' : currentVocationFilter;
                let lvlTxt = lvl === '0' ? 'Tricks' : `Lv. ${lvl}`;
                vt.textContent = `${vocTxt} — ${lvlTxt}`;
            }
            
            window.renderScripts();
        };

        window.setVocationFilter = (voc) => {
            currentVocationFilter = voc;
            window.renderVocationTabs();
            window.renderLevelTabs();
            window.setLevelFilter(currentLevelFilter); // Applies filter, updates title & renders scripts
        };

        window.renderVocationTabs = () => {
            const container = document.getElementById('vocation-tabs-container');
            if (!container) return;
            
            let html = `<button onclick="window.setVocationFilter('All')" class="vocation-tab ${currentVocationFilter === 'All' ? 'active' : ''}" id="tab-voc-All">ALL</button>`;
            
            Object.keys(VOCATION_CONFIG).forEach(v => {
                const safeId = v.replace(/\s+/g, '-');
                html += `<button onclick="window.setVocationFilter('${v}')" class="vocation-tab ${currentVocationFilter === v ? 'active' : ''}" id="tab-voc-${safeId}">${v.toUpperCase()}</button>`;
            });

            container.innerHTML = html;
        };

        window.parseAeonfallContent = (text, isDM) => {
            if (!text) return '';
            let html = text.replace(/\*\*(.*?)\*\*/g, '<b class="text-ink">$1</b>');
            html = html.replace(/\*(.*?)\*/g, '<i>$1</i>');
            html = html.replace(/__(.*?)__/g, '<u>$1</u>');
            return html;
        };

        window.renderScripts = () => {
            const isDM = activeRole === 'dm';
            const grid = document.getElementById('scripts-grid');
            if (!grid) return;

            window.renderVocationTabs();

            // Filter scripts
            let visibleScripts = scripts.filter(s => (s.level || '0') === currentLevelFilter);
            
            if (currentVocationFilter !== 'All') {
                visibleScripts = visibleScripts.filter(s => {
                    const lists = (s.lists || '').toLowerCase();
                    return lists.includes(currentVocationFilter.toLowerCase());
                });
            }

            if (visibleScripts.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center border-2 border-dashed border-gray-800 rounded-lg bg-black bg-opacity-30"><i class="fa-solid fa-scroll text-4xl text-gray-600 mb-4"></i><p class="text-gray-500 text-xs italic font-serif">No scripts documented for this level/vocation.</p></div>`;
                return;
            }

            grid.innerHTML = visibleScripts.map(s => {
                
                let dmControlsHtml = '';
                if (isDM) {
                    dmControlsHtml = `
                        <div class="absolute top-4 right-4 flex items-center gap-3 z-50 text-gray-400">
                            <button onclick="window.triggerDel('${s.id}')" class="hover:text-blood transition-colors"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    `;
                }

                // Data mapping matching the screenshot layout
                const name = s.name || '';
                const lvlTxt = s.level === '0' ? 'Trick' : `Level ${s.level}`;
                const school = s.school || 'Uncategorized';
                const sType = s.sType ? `[${s.sType}]` : '';
                
                return `
                    <div class="parchment-card p-6 pb-4">
                        ${dmControlsHtml}
                        
                        <!-- Header Area -->
                        <div class="border-b-2 border-blood pb-2 mb-4">
                            ${isDM 
                                ? `<input type="text" class="dm-input text-blood font-heading font-black text-2xl tracking-wide uppercase mb-1" value="${name}" placeholder="SCRIPT NAME" oninput="window.dbUp('${s.id}', 'name', this.value)">`
                                : `<h3 class="text-blood font-heading font-black text-2xl tracking-wide uppercase mb-1">${name}</h3>`
                            }
                            <div class="flex items-center gap-1 font-serif text-ink italic text-sm">
                                <span>${lvlTxt} —</span>
                                ${isDM ? `<input type="text" class="dm-input w-24" value="${school}" placeholder="School" oninput="window.dbUp('${s.id}', 'school', this.value)">` : `<span>${school}</span>`}
                                ${isDM ? `<input type="text" class="dm-input w-24 text-blood font-bold" value="${s.sType || ''}" placeholder="Type (e.g. Ritual)" oninput="window.dbUp('${s.id}', 'sType', this.value)">` : `<span class="text-blood font-bold">${sType}</span>`}
                            </div>
                        </div>

                        <!-- Stats List -->
                        <ul class="list-disc pl-5 space-y-1 mb-4 text-sm font-serif text-ink">
                            <li>
                                <strong class="underline decoration-dotted decoration-gray-400">Activation Time</strong>: 
                                ${isDM ? `<input type="text" class="dm-input w-32 inline-block" value="${s.activation || ''}" placeholder="1 Action" oninput="window.dbUp('${s.id}', 'activation', this.value)">` : (s.activation || '')}
                            </li>
                            <li>
                                <strong class="underline decoration-dotted decoration-gray-400">Range/Area</strong>: 
                                ${isDM ? `<input type="text" class="dm-input w-32 inline-block" value="${s.range || ''}" placeholder="30 feet" oninput="window.dbUp('${s.id}', 'range', this.value)">` : (s.range || '')}
                            </li>
                            <li>
                                <strong class="underline decoration-dotted decoration-gray-400">Components</strong>: 
                                ${isDM ? `<input type="text" class="dm-input w-48 inline-block" value="${s.comp || ''}" placeholder="V, S, M" oninput="window.dbUp('${s.id}', 'comp', this.value)">` : (s.comp || '')}
                            </li>
                            <li>
                                <strong class="underline decoration-dotted decoration-gray-400">Duration</strong>: 
                                ${isDM ? `<input type="text" class="dm-input w-48 inline-block" value="${s.duration || ''}" placeholder="Instantaneous" oninput="window.dbUp('${s.id}', 'duration', this.value)">` : (s.duration || '')}
                            </li>
                        </ul>

                        <!-- Description Block -->
                        <div class="mb-5 flex-grow">
                            ${isDM
                                ? `<textarea class="script-desc-area" placeholder="Script effects..." oninput="window.dbUp('${s.id}', 'desc', this.value)">${s.desc || ''}</textarea>`
                                : `<div class="font-serif text-sm text-ink leading-relaxed whitespace-pre-wrap">${window.parseAeonfallContent(s.desc, false)}</div>`
                            }
                        </div>

                        <!-- Higher Levels -->
                        <div class="border-t border-dashed border-gray-400 pt-3 mb-4 font-serif text-sm text-ink">
                            <strong class="underline decoration-dotted decoration-gray-400">At Higher Levels</strong>. 
                            ${isDM
                                ? `<input type="text" class="dm-input inline-block w-3/4" value="${s.scaling || ''}" placeholder="Effects when cast higher..." oninput="window.dbUp('${s.id}', 'scaling', this.value)">`
                                : (s.scaling || 'None.')
                            }
                        </div>
                        
                        <!-- Lists/Vocations -->
                        <div class="font-serif text-sm text-ink font-bold italic mb-4">
                            Lists: 
                            ${isDM
                                ? `<input type="text" class="dm-input inline-block w-3/4 not-italic font-normal" value="${s.lists || ''}" placeholder="Vocation 1, Vocation 2" oninput="window.dbUp('${s.id}', 'lists', this.value)">`
                                : (s.lists || 'None')
                            }
                        </div>

                        <!-- Copy Button -->
                        <div class="mt-auto pt-4 border-t border-gold flex justify-center">
                            <button onclick="window.openCopyModal('${s.id}')" class="bg-gray-100 hover:bg-gray-200 border border-gray-300 text-blood font-heading font-bold uppercase text-[10px] tracking-widest px-8 py-2 rounded flex items-center justify-center gap-2 transition-colors w-full">
                                <i class="fa-solid fa-copy"></i> Copy Script Data
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        };

        // --- DM ACTIONS ---
        window.addScript = async () => {
            if (activeRole !== 'dm') return;
            
            try {
                window.showToast("Inscribing blank script...");
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION), {
                    name: "New Script",
                    level: currentLevelFilter,
                    school: "Evocation",
                    sType: "",
                    activation: "1 Action",
                    range: "60 feet",
                    comp: "V, S",
                    duration: "Instantaneous",
                    desc: "Describe the effects here...",
                    scaling: "",
                    lists: currentVocationFilter !== 'All' ? currentVocationFilter : "",
                    createdAt: Date.now()
                });
            } catch (err) {
                console.error(err);
                window.showToast("Failed to ink codex.");
            }
        };

        window.triggerDel = (id) => {
            targetDelId = id;
            document.getElementById('del-modal').classList.remove('hidden');
        };

        window.executeDelete = async () => {
            if (!targetDelId || activeRole !== 'dm') return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, targetDelId));
                document.getElementById('del-modal').classList.add('hidden');
                window.showToast("Script obliterated.");
                targetDelId = null;
            } catch(e) {
                window.showToast("Failed to delete.");
            }
        };

        // --- COPY TO CHARACTER LOGIC ---
        window.openCopyModal = async (scriptId) => {
            targetCopyScript = scripts.find(s => s.id === scriptId);
            if (!targetCopyScript) return;

            document.getElementById('copy-target-name').textContent = targetCopyScript.name;
            const selectEl = document.getElementById('copy-target-select');
            
            // Populate select box with valid characters
            selectEl.innerHTML = '<option value="">Select Target...</option>';
            
            let validTargets = charactersList.filter(c => !c.isDeleted);
            
            // If player, only show characters they own
            if (activeRole !== 'dm') {
                validTargets = validTargets.filter(c => c.owner === currentUser.username);
            }

            if (validTargets.length === 0) {
                selectEl.innerHTML = '<option value="">No characters available</option>';
                selectEl.disabled = true;
            } else {
                selectEl.disabled = false;
                validTargets.forEach(c => {
                    selectEl.innerHTML += `<option value="${c.id}">${c.name} (${c.class || 'NPC'})</option>`;
                });
            }

            document.getElementById('copy-modal').classList.remove('hidden');
        };

        window.executeCopyScript = async () => {
            if (!targetCopyScript) return;
            
            const targetId = document.getElementById('copy-target-select').value;
            if (!targetId) return window.showToast("Select a target first.");

            const char = charactersList.find(c => c.id === targetId);
            if (!char) return window.showToast("Target not found.");

            try {
                // Build the move object to match what characters.html expects
                const newMove = {
                    name: targetCopyScript.name,
                    roll: "", // Scripts usually don't have a single defined roll formula in the header
                    desc: targetCopyScript.desc,
                    lvl: targetCopyScript.level === '0' ? 'Tricks (0)' : `Level ${targetCopyScript.level}`,
                    type: 'scriptcasting',
                    school: targetCopyScript.school,
                    sType: targetCopyScript.sType,
                    activation: targetCopyScript.activation,
                    range: targetCopyScript.range,
                    comp: targetCopyScript.comp,
                    duration: targetCopyScript.duration,
                    scaling: targetCopyScript.scaling
                };

                const currentMoves = char.moves || [];
                currentMoves.push(newMove);

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'characters', targetId), {
                    moves: currentMoves
                });

                document.getElementById('copy-modal').classList.add('hidden');
                window.showToast("Script Inscribed to Character!");
                targetCopyScript = null;

            } catch (err) {
                console.error(err);
                window.showToast("Failed to copy script.");
            }
        };


        // --- AUTH & INITIALIZATION ---
        onAuthStateChanged(auth, async (u) => {
            if (!u) {
                try { window.location.href = "index.html"; } catch(e) {
                    document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Authentication Required</h2>`;
                }
                return;
            }
            
            try {
                if (u.isAnonymous) {
                    currentUser = { uid: u.uid, username: "Guest Traveler", role: 'player' };
                } else {
                    const userDoc = await getDoc(doc(db, 'users', u.uid));
                    if (userDoc.exists()) {
                        currentUser = { uid: u.uid, ...userDoc.data() };
                    } else {
                        currentUser = { uid: u.uid, username: u.displayName || 'Traveler', role: 'player' };
                    }
                }

                activeRole = currentUser.role || 'player';

                if (appId !== "demo_campaign") {
                    const campDoc = await getDoc(doc(db, 'campaigns', appId));
                    if (campDoc.exists() && campDoc.data().name) {
                        const titleEl = document.getElementById('main-campaign-title');
                        if (titleEl) titleEl.innerText = campDoc.data().name;
                        document.title = `${campDoc.data().name} - Script Codex`;
                    }
                }

                document.getElementById('user-display-name').innerText = currentUser.username;
                
                // Toggle DM Features
                if (activeRole === 'dm') {
                    document.body.classList.add('dm-active-edit');
                    document.getElementById('add-script-btn').classList.remove('hidden');
                }

                document.getElementById('initial-loading').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                
                // Initialize Tabs
                window.renderVocationTabs();
                window.renderLevelTabs();
                window.setLevelFilter(currentLevelFilter);
                
                // Setup Database Listeners
                
                // 1. Listen for Scripts
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION), (snap) => {
                    scripts = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.name > b.name ? 1 : -1));
                    if (!isUserTyping) {
                        window.renderScripts();
                    }
                }, (err) => {
                    console.error("Archive failure:", err);
                    window.showToast("Archival Stream Error");
                });

                // 2. Listen for Characters (for copying)
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'characters'), (snap) => {
                    charactersList = snap.docs.map(d => ({id: d.id, ...d.data()}));
                });

            } catch (error) {
                console.error("Initialization Error:", error);
                const initLoad = document.getElementById('initial-loading');
                if (initLoad) {
                    initLoad.innerHTML = `<h2 class="font-heading text-2xl text-blood">Connection Failed</h2><p class="text-xs text-gray-400 mt-2">${error.message}</p>`;
                }
            }
        });
    </script>
</body>
</html>
