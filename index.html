<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aeonfall Campaign - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Slab', serif; background-color: #1a1a1a; color: #e2e8f0; overflow-x: hidden; }
        .dashboard-bg { background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png'); background-color: #121212; }
    </style>
</head>
<body class="min-h-screen">
    <div id="login-screen" class="min-h-screen dashboard-bg flex items-center justify-center p-4">
        <div class="bg-gray-800 border-2 border-amber-600 rounded-2xl p-8 max-w-md w-full shadow-2xl text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-amber-700 via-amber-500 to-amber-700"></div>
            <h1 class="text-4xl text-amber-500 font-bold mb-2 font-serif tracking-tight mt-4">Aeonfall</h1>
            <p class="text-gray-400 text-xs uppercase tracking-widest font-bold mb-8">Identity Verification</p>
            <div class="space-y-4 mb-8">
                <div class="text-left"><label class="text-[10px] font-black uppercase text-gray-500 ml-1">Username</label><input type="text" id="auth-username" class="w-full bg-gray-900 text-white rounded-lg p-3 border border-gray-700 font-serif focus:border-amber-500 transition-colors"></div>
                <div class="text-left"><label class="text-[10px] font-black uppercase text-gray-500 ml-1">Password</label><input type="password" id="auth-password" class="w-full bg-gray-900 text-white rounded-lg p-3 border border-gray-700 font-serif focus:border-amber-500 transition-colors"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="window.authSystem.login()" class="bg-amber-600 hover:bg-amber-500 text-white py-3 rounded-xl font-bold uppercase text-xs shadow-lg">Enter (Login)</button>
                <button onclick="window.authSystem.register()" class="bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-bold uppercase text-xs shadow-lg">Join (Register)</button>
            </div>
            <p id="auth-error" class="text-red-500 text-xs mt-4 font-bold min-h-[1rem]"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLN0KhcnZFKZEYyR0O-Q2mZhKr-iyh7BI",
            authDomain: "aeonfall-523c1.firebaseapp.com",
            projectId: "aeonfall-523c1",
            storageBucket: "aeonfall-523c1.firebasestorage.app",
            messagingSenderId: "716207733913",
            appId: "1:716207733913:web:7aac43906a70e2b5f50c08"
        };

        const appId = 'aeonfall-manager-v2';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        async function hashPassword(str) {
            const msgBuffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        window.safeRedirect = (url) => {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'data:') {
                    document.body.innerHTML = '<div class="min-h-screen bg-[#1a1a1a] flex flex-col items-center justify-center p-4"><div class="bg-gray-800 p-8 rounded-xl text-center border-2 border-indigo-600 shadow-2xl max-w-md"><h1 class="text-3xl text-indigo-500 font-serif font-black mb-4 uppercase tracking-widest">Portal Bridged</h1><p class="text-gray-300 text-sm mb-6">Authentication complete.</p><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Please manually open <span class="text-indigo-500 font-mono text-xs ml-1">' + url + '</span></p></div></div>';
                } else {
                    window.location.href = url;
                }
            } catch (e) {
                console.error("Redirect failed:", e);
            }
        };

        window.authSystem = {
            login: async () => {
                const u = document.getElementById('auth-username').value.trim().toLowerCase();
                const p = document.getElementById('auth-password').value;
                const err = document.getElementById('auth-error');
                if (!u || !p) { err.textContent = "Credentials required."; return; }
                
                try {
                    err.textContent = "Authenticating...";
                    await signInAnonymously(auth);
                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'players'), where('username', '==', u));
                    const querySnapshot = await getDocs(q);
                    
                    if (querySnapshot.empty) { err.textContent = "User not found."; return; }
                    const userData = querySnapshot.docs[0].data();
                    const inputHash = await hashPassword(p);
                    
                    if (userData.passwordHash === inputHash) {
                        currentUser = { username: u, id: querySnapshot.docs[0].id };
                        authSystem.completeAuth();
                    } else { err.textContent = "Incorrect password."; }
                } catch (e) { console.error(e); err.textContent = "Login error. Try again."; }
            },
            register: async () => {
                const u = document.getElementById('auth-username').value.trim().toLowerCase();
                const p = document.getElementById('auth-password').value;
                const err = document.getElementById('auth-error');
                if (!u || !p) { err.textContent = "Credentials required."; return; }
                if (u.length < 3) { err.textContent = "Username too short."; return; }
                
                try {
                    err.textContent = "Registering...";
                    await signInAnonymously(auth);
                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'players'), where('username', '==', u));
                    const querySnapshot = await getDocs(q);
                    
                    if (!querySnapshot.empty) { err.textContent = "Username taken."; return; }
                    const passHash = await hashPassword(p);
                    const newDoc = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'players'), { username: u, passwordHash: passHash, createdAt: Date.now() });
                    
                    currentUser = { username: u, id: newDoc.id };
                    authSystem.completeAuth();
                } catch (e) { console.error(e); err.textContent = "Registration failed."; }
            },
            completeAuth: () => {
                localStorage.setItem('aeonfall_user', JSON.stringify(currentUser));
                window.safeRedirect('campaign.html');
            }
        };

        // Auto-redirect if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('aeonfall_user');
            if (savedUser) {
                window.safeRedirect('campaign.html');
            }
        });
    </script>
</body>
</html>
