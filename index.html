<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicles of the Realm - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'parchment': '#f1e5c5',
                        'ink': '#2c1e16',
                        'blood': '#7a1b1b',
                        'gold': '#c5a059',
                        'wood': '#1a110b'
                    },
                    fontFamily: {
                        'serif': ['Lora', 'serif'],
                        'heading': ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a110b;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%232c1e16' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: #2c1e16;
            margin: 0;
            overflow-x: hidden;
        }

        .parchment-bg {
            background-color: #f1e5c5;
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.3) 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            box-shadow: inset 0 0 40px rgba(139, 90, 43, 0.4), 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #c5a059;
            border-radius: 4px;
        }

        .fantasy-btn {
            background: linear-gradient(to bottom, #8a2b2b, #5a1111);
            color: #f1e5c5;
            border: 2px solid #c5a059;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .fantasy-btn:hover {
            background: linear-gradient(to bottom, #a33232, #7a1b1b);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
            border-color: #e8cd87;
        }

        .fantasy-input {
            background-color: rgba(255, 255, 255, 0.4);
            border: 1px solid #8b5a2b;
            border-bottom: 2px solid #c5a059;
            color: #2c1e16;
            font-family: 'Lora', serif;
            transition: all 0.3s;
        }

        .fantasy-input:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.7);
            border-bottom-color: #8a2b2b;
        }

        .ornamental-hr {
            border: 0;
            height: 2px;
            background-image: linear-gradient(to right, rgba(197, 160, 89, 0), rgba(197, 160, 89, 0.8), rgba(197, 160, 89, 0));
            margin: 20px 0;
            position: relative;
        }
        
        .ornamental-hr::after {
            content: "♦";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: #c5a059;
            font-size: 16px;
        }

        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-serif antialiased h-screen flex flex-col items-center justify-center">

    <!-- Global Modal for Errors -->
    <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="parchment-bg p-8 max-w-sm w-full mx-4 rounded-lg shadow-2xl text-center">
            <h3 id="modal-title" class="font-heading text-2xl font-bold text-blood mb-4">Notification</h3>
            <p id="modal-message" class="text-ink mb-6"></p>
            <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="fantasy-btn px-6 py-2 rounded">Acknowledge</button>
        </div>
    </div>

    <!-- Initial Loading State (While checking auth session) -->
    <div id="initial-loading" class="flex flex-col items-center justify-center fade-in">
        <i class="fa-solid fa-circle-notch fa-spin text-6xl text-gold mb-6"></i>
        <h2 class="font-heading text-2xl text-parchment animate-pulse">Reading the Runes...</h2>
    </div>

    <!-- Auth View (Hidden until auth check completes) -->
    <div id="auth-view" class="hidden w-full max-w-lg p-4 fade-in">
        <div class="parchment-bg p-10 relative overflow-hidden shadow-2xl">
            <div class="absolute top-2 left-2 text-gold text-2xl"><i class="fa-solid fa-dragon"></i></div>
            <div class="absolute top-2 right-2 text-gold text-2xl"><i class="fa-solid fa-khanda"></i></div>
            <div class="absolute bottom-2 left-2 text-gold text-2xl"><i class="fa-solid fa-dungeon"></i></div>
            <div class="absolute bottom-2 right-2 text-gold text-2xl"><i class="fa-solid fa-dice-d20"></i></div>

            <div class="text-center mb-6">
                <h1 class="font-heading text-4xl font-bold text-ink drop-shadow-md mb-2">Chronicles of the Realm</h1>
                <p class="text-sm italic text-gray-700">Identify thyself to access the campaigns</p>
                <hr class="ornamental-hr">
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-gold mb-6">
                <button id="tab-login" class="flex-1 py-2 font-heading font-bold text-blood border-b-4 border-blood" onclick="switchAuthTab('login')">Login</button>
                <button id="tab-register" class="flex-1 py-2 font-heading font-bold text-ink hover:text-blood transition" onclick="switchAuthTab('register')">Register</button>
            </div>

            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block font-heading font-bold text-ink mb-1">Email</label>
                    <input type="email" id="auth-email" required class="fantasy-input w-full p-3 rounded" placeholder="traveler@realm.com">
                </div>
                <div>
                    <label class="block font-heading font-bold text-ink mb-1">Password</label>
                    <input type="password" id="auth-password" required class="fantasy-input w-full p-3 rounded" placeholder="Your secret passphrase">
                </div>

                <!-- Registration Only Fields -->
                <div id="register-fields" class="hidden space-y-5 slide-up">
                    <div>
                        <label class="block font-heading font-bold text-ink mb-1">Display Name</label>
                        <input type="text" id="auth-reg-username" class="fantasy-input w-full p-3 rounded" placeholder="E.g. Gandalf">
                    </div>
                    <div>
                        <label class="block font-heading font-bold text-ink mb-2">Choose Your Path</label>
                        <div class="grid grid-cols-2 gap-4">
                            <label class="cursor-pointer">
                                <input type="radio" name="auth-role" value="player" checked class="peer hidden">
                                <div class="fantasy-btn bg-opacity-50 peer-checked:bg-opacity-100 peer-checked:shadow-inner p-3 text-center rounded opacity-60 peer-checked:opacity-100 text-sm">
                                    <i class="fa-solid fa-khanda block mb-1"></i> Player
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="auth-role" value="dm" class="peer hidden">
                                <div class="fantasy-btn bg-opacity-50 peer-checked:bg-opacity-100 peer-checked:shadow-inner p-3 text-center rounded opacity-60 peer-checked:opacity-100 text-sm">
                                    <i class="fa-solid fa-dragon block mb-1"></i> Dungeon Master
                                </div>
                            </label>
                        </div>
                    </div>
                    <div id="dm-secret-container" class="hidden slide-up">
                        <label class="block font-heading font-bold text-blood mb-1">DM Sanctum Password</label>
                        <p class="text-xs italic mb-2">Required to edit campaign rules and world lore.</p>
                        <input type="password" id="auth-dm-secret" class="fantasy-input w-full p-3 rounded" placeholder="Sanctum passphrase...">
                    </div>
                </div>

                <button type="submit" id="auth-submit-btn" class="fantasy-btn w-full py-4 text-xl rounded mt-6 shadow-lg">Enter the Realm</button>
                
                <div class="relative flex py-4 items-center">
                    <div class="flex-grow border-t border-gold"></div>
                    <span class="flex-shrink-0 mx-4 text-ink font-heading font-bold text-sm">OR</span>
                    <div class="flex-grow border-t border-gold"></div>
                </div>

                <button type="button" id="btn-google-signin" class="w-full py-3 bg-white text-gray-800 font-bold rounded shadow flex items-center justify-center gap-3 hover:bg-gray-100 transition border border-gray-300">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continue with Google
                </button>
                
                <button type="button" id="btn-guest-signin" class="w-full py-3 fantasy-btn-alt rounded mt-2">
                    <i class="fa-solid fa-eye mr-2"></i>Enter as Guest
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCKRN5dfi4og69_D8ZAvV1BQfwCK_f2uis",
            authDomain: "dndcampaigns-f3d48.firebaseapp.com",
            projectId: "dndcampaigns-f3d48",
            storageBucket: "dndcampaigns-f3d48.firebasestorage.app",
            messagingSenderId: "1074491536795",
            appId: "1:1074491536795:web:56211729489be776d79d3e",
            measurementId: "G-71DW54NTWV"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        let currentAuthMode = 'login'; // 'login' or 'register'

        window.showModal = (title, message) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('modal-container').classList.remove('hidden');
        };

        // --- AUTHENTICATION STATE OBSERVER ---
        // Automatically redirects to campaigns.html if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is authenticated! Redirecting...
                try {
                    window.location.href = "campaigns.html";
                } catch(e) {
                    document.getElementById('initial-loading').classList.add('hidden');
                    document.getElementById('auth-view').innerHTML = `
                        <div class="parchment-bg p-10 text-center shadow-2xl border-2 border-gold rounded-lg">
                            <h2 class="text-blood font-heading text-2xl mb-4 font-bold">Already Logged In!</h2>
                            <p class="text-ink font-serif text-sm">Because you are viewing this in a preview window, automatic redirects are disabled.<br><br>Please manually open <b>campaigns.html</b> to continue.</p>
                        </div>
                    `;
                    document.getElementById('auth-view').classList.remove('hidden');
                }
            } else {
                // User is not logged in. Reveal the login form.
                document.getElementById('initial-loading').classList.add('hidden');
                document.getElementById('auth-view').classList.remove('hidden');
            }
        });

        // Tab Switching Logic
        window.switchAuthTab = (mode) => {
            currentAuthMode = mode;
            const btnLogin = document.getElementById('tab-login');
            const btnRegister = document.getElementById('tab-register');
            const registerFields = document.getElementById('register-fields');
            const submitBtn = document.getElementById('auth-submit-btn');

            if (mode === 'login') {
                btnLogin.className = "flex-1 py-2 font-heading font-bold text-blood border-b-4 border-blood";
                btnRegister.className = "flex-1 py-2 font-heading font-bold text-ink hover:text-blood transition";
                registerFields.classList.add('hidden');
                submitBtn.innerText = "Enter the Realm";
            } else {
                btnRegister.className = "flex-1 py-2 font-heading font-bold text-blood border-b-4 border-blood";
                btnLogin.className = "flex-1 py-2 font-heading font-bold text-ink hover:text-blood transition";
                registerFields.classList.remove('hidden');
                submitBtn.innerText = "Forge Account";
            }
        };

        // Handle DM Secret visibility
        document.querySelectorAll('input[name="auth-role"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.getElementById('dm-secret-container').classList.toggle('hidden', e.target.value !== 'dm');
            });
        });

        // Handle Google Sign-In
        document.getElementById('btn-google-signin').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                // Check if user already exists in our Firestore
                const userDocRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userDocRef);
                
                if (!userDoc.exists()) {
                    // Create default player profile for new Google users
                    await setDoc(userDocRef, {
                        username: user.displayName || 'Wanderer',
                        email: user.email,
                        role: 'player', // Default to player, they can forge a DM account via email if needed
                        dmSecret: null,
                        createdAt: new Date().toISOString()
                    });
                }
                // onAuthStateChanged will handle the redirect
            } catch (error) {
                console.error("Google Auth Error:", error);
                showModal("Error", error.message);
            }
        });

        // Handle Guest Sign-In
        document.getElementById('btn-guest-signin').addEventListener('click', async () => {
            const submitBtn = document.getElementById('btn-guest-signin');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin mr-2'></i>Opening Gates...";
            submitBtn.disabled = true;

            try {
                await signInAnonymously(auth);
                // onAuthStateChanged will automatically catch this and redirect!
            } catch (error) {
                console.error("Guest Auth Error:", error);
                showModal("Error", "Failed to enter as guest. " + error.message);
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // Handle Login/Register Submission
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            
            if(!email || !password) return showModal("Hold!", "Email and password are required.");
            
            const submitBtn = document.getElementById('auth-submit-btn');
            submitBtn.innerText = "Casting Magic...";
            submitBtn.disabled = true;

            try {
                if (currentAuthMode === 'register') {
                    // REGISTRATION
                    const username = document.getElementById('auth-reg-username').value.trim();
                    if(!username) {
                        submitBtn.disabled = false;
                        submitBtn.innerText = "Forge Account";
                        return showModal("Hold!", "You must choose a display name.");
                    }

                    const role = document.querySelector('input[name="auth-role"]:checked').value;
                    const dmSecret = document.getElementById('auth-dm-secret').value.trim();
                    
                    if (role === 'dm' && !dmSecret) {
                        submitBtn.innerText = "Forge Account";
                        submitBtn.disabled = false;
                        return showModal("Hold!", "A Dungeon Master must set a Sanctum password.");
                    }

                    // 1. Create account in Firebase Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // 2. Save public profile data to Firestore 'users' collection
                    await setDoc(doc(db, 'users', user.uid), {
                        username: username,
                        email: email,
                        role: role,
                        dmSecret: role === 'dm' ? dmSecret : null,
                        createdAt: new Date().toISOString()
                    });

                    // onAuthStateChanged will automatically catch this and redirect!
                } else {
                    // LOGIN
                    await signInWithEmailAndPassword(auth, email, password);
                    // onAuthStateChanged will automatically catch this and redirect!
                }
            } catch (error) {
                console.error("Auth Error:", error);
                submitBtn.disabled = false;
                submitBtn.innerText = currentAuthMode === 'login' ? "Enter the Realm" : "Forge Account";
                
                if(error.code === 'auth/email-already-in-use') {
                    showModal("Access Denied", "That email is already claimed by another traveler.");
                } else if (error.code === 'auth/invalid-credential') {
                    showModal("Access Denied", "Incorrect email or passphrase.");
                } else {
                    showModal("Error", error.message);
                }
            }
        });
    </script>
</body>
</html>
